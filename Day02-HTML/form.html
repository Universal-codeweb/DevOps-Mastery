<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel ="stylesheet" href ="../Day03-CSS-basics/form.css">
</head>
<body>
    <header>
        <h1>Tekrearc</h1>
    </header>
    <section id = "sign-up">
        <h2>Sign Up</h2>
        <div class = "sign-up-box">
            <form>
                <label>Name</label>
                <input type = "text">
                <br><br>
                <label>Email</label>
                <input type = "email">
                <br><br>
                <label> Password</label>
                <input type = "password">
                <br><br>
                <label>User Type:</label>
                <input type = "radio" name="p">Public
                <input type = "radio" name="p">Architect
                <input type = "radio" name="p">Student
                <input type = "radio" name="p">Admin
                <br><br>
                <button>Sign Up</button>

            </form>
        </div>
    </section>
    
    
</body>
</html>
